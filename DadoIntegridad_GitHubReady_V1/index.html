<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dado de la Integridad</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --ink: #152033;
      --muted: #5d6878;
      --line: rgba(110, 132, 154, .2);
      --accent: #0f8ebd;
      --accent-dark: #096b91;
      --green: #315f50;
      --gold: #bd8f18;
      --cube-size: min(46vh, 30vw, 320px);
      --half-cube: calc(var(--cube-size) / 2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(15, 142, 189, .18), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(189, 143, 24, .16), transparent 28rem),
        linear-gradient(135deg, #f7fafc 0%, var(--bg) 58%, #eef3f8 100%);
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 12px 1fr 12px;
    }

    .band {
      background: linear-gradient(90deg, var(--green), var(--gold), var(--accent));
    }

    main {
      width: min(96vw, 1180px);
      min-height: 0;
      margin: 0 auto;
      padding: clamp(14px, 2.4vh, 26px) 0;
      display: grid;
      grid-template-columns: minmax(290px, 1fr) minmax(330px, 440px);
      gap: clamp(20px, 4vw, 54px);
      align-items: center;
    }

    .stage {
      min-height: calc(var(--cube-size) + 52px);
      display: grid;
      place-items: center;
      perspective: 1100px;
    }

    .cube {
      position: relative;
      width: var(--cube-size);
      height: var(--cube-size);
      transform-style: preserve-3d;
      transform: rotateX(-18deg) rotateY(28deg);
      transition: transform 4.2s cubic-bezier(.14, .76, .24, 1);
    }

    .cube::before {
      content: "";
      position: absolute;
      inset: 8%;
      transform: translateZ(calc(var(--half-cube) * -1.12)) rotateX(90deg);
      background: rgba(10, 24, 38, .22);
      filter: blur(22px);
      border-radius: 30%;
    }

    .face {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, .72);
      background: #fff;
      box-shadow: inset 0 0 0 1px rgba(13, 33, 51, .08);
      backface-visibility: hidden;
    }

    .face img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .front { transform: translateZ(var(--half-cube)); }
    .back { transform: rotateY(180deg) translateZ(var(--half-cube)); }
    .right { transform: rotateY(90deg) translateZ(var(--half-cube)); }
    .left { transform: rotateY(-90deg) translateZ(var(--half-cube)); }
    .top { transform: rotateX(90deg) translateZ(var(--half-cube)); }
    .bottom { transform: rotateX(-90deg) translateZ(var(--half-cube)); }

    .controls {
      max-height: calc(100vh - 52px);
      padding: clamp(18px, 3vh, 28px);
      display: grid;
      gap: 14px;
      background: rgba(255, 255, 255, .9);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 22px 60px rgba(35, 49, 66, .12);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5.5vh, 3.2rem);
      line-height: .96;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: clamp(.95rem, 1.8vh, 1.04rem);
      line-height: 1.42;
    }

    .dice-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .dice-tab,
    .roll-button,
    .download-link {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: 0;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    }

    .dice-tab {
      padding: 9px 8px;
      color: var(--ink);
      background: #eef3f8;
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .dice-tab[aria-pressed="true"] {
      color: #fff;
      background: linear-gradient(135deg, var(--green), #24483d);
      border-color: transparent;
    }

    .roll-button,
    .download-link {
      width: 100%;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      box-shadow: 0 14px 30px rgba(15, 142, 189, .26);
    }

    .roll-button:hover,
    .download-link:hover,
    .dice-tab:hover {
      transform: translateY(-1px);
    }

    .roll-button:disabled {
      cursor: wait;
      opacity: .72;
      transform: none;
    }

    .outcome {
      display: grid;
      gap: 10px;
    }

    .theme,
    .prompt {
      padding: 14px 16px;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid var(--line);
    }

    .theme {
      min-height: 68px;
      display: grid;
      align-content: center;
    }

    .prompt {
      min-height: 104px;
      border-left: 5px solid var(--gold);
    }

    .eyebrow {
      display: block;
      color: var(--muted);
      font-size: .76rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .theme strong,
    .prompt strong {
      display: block;
      margin-top: 4px;
      color: var(--ink);
      line-height: 1.18;
    }

    .theme strong {
      font-size: clamp(1.12rem, 2.4vh, 1.45rem);
    }

    .prompt strong {
      font-size: clamp(1rem, 2vh, 1.2rem);
    }

    .download-link {
      min-height: 42px;
      display: inline-grid;
      place-items: center;
      text-decoration: none;
      background: linear-gradient(135deg, var(--green), #24483d);
      box-shadow: 0 12px 26px rgba(49, 95, 80, .2);
    }

    @media (max-width: 820px) {
      :root {
        --cube-size: min(36vh, 66vw, 280px);
      }

      body {
        overflow: auto;
      }

      .page {
        min-min-height: 100vh;
        height: auto;
      }

      main {
        grid-template-columns: 1fr;
        padding: 16px 0;
      }

      .controls {
        order: -1;
        max-height: none;
      }
    }

    @media (max-height: 680px) and (min-width: 821px) {
      :root {
        --cube-size: min(42vh, 285px);
      }

      .controls {
        gap: 10px;
        padding: 18px;
      }

      .theme,
      .prompt {
        padding: 12px 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cube,
      button,
      .download-link {
        transition-duration: .01ms;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="band" aria-hidden="true"></div>

    <main>
      <section class="stage" aria-label="Dado virtual">
        <div class="cube" id="cube">
          <div class="face front"><img id="face-front" alt=""></div>
          <div class="face back"><img id="face-back" alt=""></div>
          <div class="face right"><img id="face-right" alt=""></div>
          <div class="face left"><img id="face-left" alt=""></div>
          <div class="face top"><img id="face-top" alt=""></div>
          <div class="face bottom"><img id="face-bottom" alt=""></div>
        </div>
      </section>

      <section class="controls">
        <h1>Dado de la Integridad</h1>
        <p class="lead">Selecciona uno de los tres dados, lánzalo para seleccionar un principio o valor, y contesta la pregunta o realiza el reto que corresponda.</p>

        <div class="dice-tabs" aria-label="Seleccionar dado">
          <button class="dice-tab" type="button" data-dice="principios1" aria-pressed="true">Principios I</button>
          <button class="dice-tab" type="button" data-dice="principios2" aria-pressed="false">Principios II</button>
          <button class="dice-tab" type="button" data-dice="valores" aria-pressed="false">Valores</button>
        </div>

        <button class="roll-button" type="button" id="rollButton">Lanzar dado</button>

        <div class="outcome" aria-live="polite">
          <div class="theme">
            <strong id="resultText">Elige un dado y lánzalo</strong>
          </div>

          <div class="prompt">
            <span class="eyebrow" id="promptType">Pregunta o reto</span>
            <strong id="promptText">Aquí aparecerá la consigna para abrir la conversación.</strong>
          </div>
        </div>

        <a class="download-link" href="dado-virtual-integridad.zip" download>Descargar aplicativo</a>
      </section>
    </main>

    <div class="band" aria-hidden="true"></div>
  </div>

  <script src="banco-preguntas.js?v=3"></script>
  <script>
    const cube = document.getElementById("cube");
    const button = document.getElementById("rollButton");
    const resultText = document.getElementById("resultText");
    const promptType = document.getElementById("promptType");
    const promptText = document.getElementById("promptText");
    const tabs = [...document.querySelectorAll(".dice-tab")];
    const fullscreenButton=document.getElementById("fullscreenButton");
const soundToggle=document.getElementById("soundToggle");
let soundEnabled=true;

function playRollSound(){
 if(!soundEnabled) return;
 try{
   const ctx=new (window.AudioContext||window.webkitAudioContext)();
   const osc=ctx.createOscillator();
   const gain=ctx.createGain();
   osc.type="triangle";
   osc.frequency.setValueAtTime(180,ctx.currentTime);
   osc.frequency.exponentialRampToValueAtTime(70,ctx.currentTime+0.6);
   gain.gain.setValueAtTime(0.03,ctx.currentTime);
   gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.6);
   osc.connect(gain);
   gain.connect(ctx.destination);
   osc.start();
   osc.stop(ctx.currentTime+0.6);
 }catch(e){}
}

    const dice = {
      principios1: {
        label: "Principios I",
        faces: [
          { name: "Respeto a los Derechos Humanos", image: "assets/dados/principios-1-01.png", x: 0, y: 0 },
          { name: "Rendición de Cuentas", image: "assets/dados/principios-1-02.png", x: 0, y: -90 },
          { name: "Eficiencia", image: "assets/dados/principios-1-05.png", x: -90, y: 0 },
          { name: "Legalidad", image: "assets/dados/principios-1-03.png", x: 0, y: 180 },
          { name: "Lealtad", image: "assets/dados/principios-1-06.png", x: 90, y: 0 },
          { name: "Profesionalismo", image: "assets/dados/principios-1-04.png", x: 0, y: 90 }
        ]
      },
      principios2: {
        label: "Principios II",
        faces: [
          { name: "Transparencia", image: "assets/dados/principios-2-01.png", x: 0, y: 0 },
          { name: "Eficacia", image: "assets/dados/principios-2-02.png", x: 0, y: -90 },
          { name: "Imparcialidad", image: "assets/dados/principios-2-03.png", x: -90, y: 0 },
          { name: "Austeridad", image: "assets/dados/principios-2-04.png", x: 0, y: 180 },
          { name: "Objetividad", image: "assets/dados/principios-2-05.png", x: 90, y: 0 },
          { name: "Honradez", image: "assets/dados/principios-2-06.png", x: 0, y: 90 }
        ]
      },
      valores: {
        label: "Valores",
        faces: [
          { name: "Honestidad", image: "assets/dados/valores-01.png", x: 0, y: 0 },
          { name: "Liderazgo", image: "assets/dados/valores-02.png", x: 0, y: -90 },
          { name: "Respeto", image: "assets/dados/valores-03.png", x: -90, y: 0 },
          { name: "Cooperación", image: "assets/dados/valores-04.png", x: 0, y: 180 },
          { name: "Empatía", image: "assets/dados/valores-05.png", x: 90, y: 0 },
          { name: "Cuidado al Entorno Cultural y Ecológico", image: "assets/dados/valores-06.png", x: 0, y: 90 }
        ]
      }
    };

    const faceSlots = [
      document.getElementById("face-front"),
      document.getElementById("face-right"),
      document.getElementById("face-top"),
      document.getElementById("face-back"),
      document.getElementById("face-bottom"),
      document.getElementById("face-left")
    ];

    const banco = window.DADO_INTEGRIDAD_BANCO || { preguntas: [], retos: [] };
    const consignas = [
      ...(banco.preguntas || []).map(text => ({ type: "Pregunta", text })),
      ...(banco.retos || []).map(text => ({ type: "Reto", text }))
    ];

    let currentDiceKey = "principios1";
    let launches = 0;
    let usedQuestions=[]; let usedRetos=[];
    let usedFaces={principios1:[],principios2:[],valores:[]};

    function setDice(key) {
      currentDiceKey = key;
      const selectedDice = dice[key];

      selectedDice.faces.forEach((face, index) => {
        faceSlots[index].src = `${face.image}?v=1`;
        faceSlots[index].alt = face.name;
      });

      tabs.forEach(tab => {
        tab.setAttribute("aria-pressed", String(tab.dataset.dice === key));
      });

      cube.style.transform = "rotateX(-18deg) rotateY(28deg)";
      resultText.textContent = `${selectedDice.label} seleccionado`;
      promptType.textContent = "Pregunta o reto";
      promptText.textContent = "Lanza el dado para ver la consigna.";
    }

    function getPrompt(topic) {
if (Math.random()<0.5 && (banco.preguntas||[]).length){
 if(usedQuestions.length===banco.preguntas.length) usedQuestions=[];
 let disponibles=banco.preguntas.filter(x=>!usedQuestions.includes(x));
 let texto=disponibles[Math.floor(Math.random()*disponibles.length)];
 usedQuestions.push(texto);
 return {type:"Pregunta",text:texto.replaceAll("{tema}",topic).replaceAll("{principio}",topic)};
}
if((banco.retos||[]).length){
 if(usedRetos.length===banco.retos.length) usedRetos=[];
 let disponibles=banco.retos.filter(x=>!usedRetos.includes(x));
 let texto=disponibles[Math.floor(Math.random()*disponibles.length)];
 usedRetos.push(texto);
 return {type:"Reto",text:texto.replaceAll("{tema}",topic).replaceAll("{principio}",topic)};
}
return {type:"Pregunta",text:"Agrega preguntas en banco-preguntas.js."};
}

    function rollDice() {
      const selectedDice = dice[currentDiceKey];
      if(usedFaces[currentDiceKey].length===selectedDice.faces.length){usedFaces[currentDiceKey]=[];}
      const disponibles=selectedDice.faces.filter(f=>!usedFaces[currentDiceKey].includes(f.name));
      const selected=disponibles[Math.floor(Math.random()*disponibles.length)];
      usedFaces[currentDiceKey].push(selected.name);
      const extraX = 360 * (4 + launches);
      const extraY = 360 * (5 + launches);

      launches += 1;
      button.disabled = true;
      resultText.textContent = "Girando...";
      promptType.textContent = "Pregunta o reto";
      promptText.textContent = "Preparando consigna...";
      cube.style.transform = `rotateX(${extraX + selected.x}deg) rotateY(${extraY + selected.y}deg)`;

      window.setTimeout(() => {
        const prompt = getPrompt(selected.name);

        resultText.textContent = selected.name;
        promptType.textContent = prompt.type;
        promptText.textContent = prompt.text;
        button.disabled = false;
      }, 4300);
    }

    tabs.forEach(tab => {
      tab.addEventListener("click", () => setDice(tab.dataset.dice));
    });

    button.addEventListener("click", ()=>{playRollSound(); rollDice();});

    if(fullscreenButton){
    fullscreenButton.addEventListener("click", async ()=>{
      try{
        if(!document.fullscreenElement){
          await document.documentElement.requestFullscreen();
          fullscreenButton.textContent="⛶ Salir de pantalla completa";
        }else{
          await document.exitFullscreen();
          fullscreenButton.textContent="⛶ Pantalla completa";
        }
      }catch(e){ console.error(e); }
    });
    }

    if(soundToggle){
    soundToggle.addEventListener("click",()=>{
  soundEnabled=!soundEnabled;
  soundToggle.textContent=soundEnabled?"🔊 Sonido ON":"🔇 Sonido OFF";
});
}

document.addEventListener("fullscreenchange",()=>{
      if(!fullscreenButton) return;
      fullscreenButton.textContent=document.fullscreenElement?
      "⛶ Salir de pantalla completa":"⛶ Pantalla completa";
    });

    
    // V4.3.1 inicio con Principios I y precarga de imágenes
    try{
      currentDiceKey = "principios1";
      if (typeof setDice === "function") {
        setDice("principios1");
      }
      window.addEventListener("load", ()=>{
        try{
          const preloadSet = diceSets && diceSets["principios1"] ? diceSets["principios1"] : [];
          preloadSet.forEach(item=>{
            if(item.image){
              const img=new Image();
              img.src=item.image;
            }
          });
        }catch(e){}
      });
    }catch(e){}

    setDice(currentDiceKey);
  </script>
</body>
</html>
